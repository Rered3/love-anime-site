<!DOCTYPE html>
<html>
<head>
<title>Final</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="fade">
<div class="bg"></div>

<div class="center">
    <h1>💌 Final Words</h1>
    <p>
        If someday you feel even a little of what I feel…<br>
        I’ll be here.
    </p>

    <h2 style="color:#ffb6c1;">— Rohail</h2>

    <p>🌸 Thank you for existing in my world</p>
</div>

<script>
for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(Math.random()*5+3)+"s";
    document.body.appendChild(h);
}
</script>

</body>
</html>
