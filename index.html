<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body onclick="initMusic()">

<div class="bg"></div>
<div class="overlay"></div>
<div class="particles"></div>

<div class="center">

    <h1 class="title">🎬 Memory World</h1>

    <p class="text">
        A cinematic story of feelings… waiting to be unlocked.
    </p>

    <input id="name" placeholder="Enter name"
    style="padding:12px;border-radius:12px;font-size:18px;">

    <br><br>

    <button onclick="unlock()">Enter</button>

</div>

<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<script src="engine.js"></script>

<script>
initMusic();

function unlock(){
    let v = document.getElementById("name").value;

    if(v.toLowerCase() === "mubashira"){
        goPage("scene1.html");
    } else {
        alert("Access denied 💔");
    }
}
</script>

</body>
</html>
