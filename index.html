<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body onclick="initMusic()">

<div class="bg"></div>
<div class="overlay"></div>

<div class="center">
    <h1 class="title">🌌 A Memory For You</h1>

    <p class="text">Enter her name to unlock the world</p>

    <input id="name" placeholder="Enter name..."
    style="padding:10px;border-radius:10px;font-size:16px;">

    <br><br>

    <button onclick="check()">Unlock</button>
</div>

<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<script src="engine.js"></script>

<script>
initMusic();

function check(){
    let v = document.getElementById("name").value;

    if(v.toLowerCase() === "mubashira"){
        goPage("scene2.html");
    } else {
        alert("Wrong name 💔");
    }
}
</script>

</body>
</html>
