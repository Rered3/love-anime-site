<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="center">

    <h1 class="title">🌌 Enter My World</h1>

    <p class="text">
        A place built from memories, silence, and feelings.
    </p>

    <input id="name" placeholder="Enter name..."
    style="padding:12px;border-radius:12px;font-size:18px;">

    <br><br>

    <button onclick="check()">Unlock</button>

</div>

<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<script src="engine.js"></script>

<script>
initMusic();

function check(){
    let v = document.getElementById("name").value;

    if(v.toLowerCase() === "mubashira"){
        goPage("scene2.html");
    } else {
        alert("Wrong name 💔");
    }
}
</script>

</body>
</html>
